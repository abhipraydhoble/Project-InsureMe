name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build Maven
        run: mvn clean package

      - name: Build Docker Image
        run: docker build -t demo .

      - name: Run Container
        run: |
          docker rm -f c1 || true
          docker run -d --name c1 -p 8089:8081 demo
